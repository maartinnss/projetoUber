# Domínio permitido para CORS — ajustar para seu domínio em produção
# Para ter flexibilidade, defina via variável de ambiente CORS_ORIGIN
# Ex: CORS_ORIGIN=https://driverelite.up.railway.app
map $http_origin $cors_origin {
    default "";
    "~^https?://(localhost|127\.0\.0\.1)(:[0-9]+)?$" $http_origin;
    "~^https://(.+\.)?railway\.app$"                 $http_origin;
    # Adicione seu domínio de produção aqui:
    # "https://www.seudominio.com.br"                $http_origin;
}

server {
    listen 80;
    server_name localhost;
    root /var/www/html/public;
    index index.html index.php;

    # Desabilita o sendfile para corrigir cache de volumes no Docker/Windows
    sendfile off;

    # Security Headers
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # CORS Headers — restrito a domínios autorizados
    add_header 'Access-Control-Allow-Origin' $cors_origin always;
    add_header 'Access-Control-Allow-Methods' 'GET, POST, OPTIONS' always;
    add_header 'Access-Control-Allow-Headers' 'Content-Type, Authorization, X-Requested-With' always;
    add_header 'Access-Control-Max-Age' 3600 always;

    # Preflight CORS — cobre TODAS as rotas /api/*
    location ~ ^/api/ {
        if ($request_method = OPTIONS) {
            add_header 'Access-Control-Allow-Origin' $cors_origin;
            add_header 'Access-Control-Allow-Methods' 'GET, POST, OPTIONS';
            add_header 'Access-Control-Allow-Headers' 'Content-Type, Authorization, X-Requested-With';
            add_header 'Access-Control-Max-Age' 3600;
            return 204;
        }

        # Requests normais passam para o PHP-FPM
        try_files $uri /index.php?$query_string;
    }

    location / {
        try_files $uri $uri/ /index.php?$query_string;
    }

    location ~ \.php$ {
        fastcgi_pass app:9000;
        fastcgi_index index.php;
        fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
        include fastcgi_params;
    }

    location ~ /\.ht {
        deny all;
    }
}
