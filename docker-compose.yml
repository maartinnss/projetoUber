
services:
  app:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: motorista-php
    restart: unless-stopped
    volumes:
      - ./backend:/var/www/html
    networks:
      - app-network
    depends_on:
      db:
        condition: service_healthy
    environment:
      - DB_HOST=${DB_HOST}
      - DB_PORT=${DB_PORT}
      - DB_DATABASE=${DB_DATABASE}
      - DB_USERNAME=${DB_USERNAME}
      - DB_PASSWORD=${DB_PASSWORD}
      - WHATSAPP_NUMBER=${WHATSAPP_NUMBER:-554896643792}

  db:
    image: mariadb:10.11
    container_name: motorista-db
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD}
      MYSQL_DATABASE: ${DB_DATABASE}
      MYSQL_USER: ${DB_USERNAME}
      MYSQL_PASSWORD: ${DB_PASSWORD}
    volumes:
      - db-data:/var/lib/mysql
      - ./backend/db:/docker-entrypoint-initdb.d
    # Porta removida para segurança — acesse via rede interna Docker
    # Para debug local, descomente: ports: ["3307:3306"]
    networks:
      - app-network
    healthcheck:
      test: ["CMD", "healthcheck.sh", "--connect", "--innodb_initialized"]
      interval: 10s
      timeout: 5s
      retries: 5

  nginx:
    image: nginx:alpine
    container_name: motorista-nginx
    restart: unless-stopped
    ports:
      - "${APP_PORT:-8080}:80"
    volumes:
      - ./backend:/var/www/html
      - ./frontend:/var/www/html/public
      - ./backend/public/index.php:/var/www/html/public/index.php
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf
    networks:
      - app-network
    depends_on:
      - app

volumes:
  db-data:

networks:
  app-network:
    driver: bridge
